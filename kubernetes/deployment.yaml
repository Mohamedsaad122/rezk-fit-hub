apiVersion: apps/v1
kind: Deployment
metadata:
  name: rezk-fit-hub-frontend
  namespace: rezk-fit-hub-prod
  labels:
    app: rezk-fit-hub
    component: frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rezk-fit-hub
      component: frontend
  template:
    metadata:
      labels:
        app: rezk-fit-hub
        component: frontend
    spec:
      containers:
      - name: frontend
        image: rezk-fit-hub-frontend:1.2.0
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health
            port: 80
          failureThreshold: 30
          periodSeconds: 10
        volumeMounts:
        - name: app-configs
          mountPath: /usr/share/nginx/html/config.json
          subPath: config.json
      volumes:
      - name: app-configs
        configMap:
          name: rezk-fit-hub-config
