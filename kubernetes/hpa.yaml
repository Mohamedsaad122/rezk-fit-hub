apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rezk-fit-hub-hpa
  namespace: rezk-fit-hub-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rezk-fit-hub-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
